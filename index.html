<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Plan de Vida</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C0392B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Plan de Vida">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --rojo: #C0392B;
  --rojo-claro: #E74C3C;
  --amarillo: #F1C40F;
  --verde: #1D9E75;
  --verde-claro: #E1F5EE;
  --verde-oscuro: #085041;
  --azul: #2980B9;
  --azul-claro: #EAF4FB;
  --morado: #7B2D9E;
  --morado-claro: #F5EDFB;
  --gris: #888;
  --gris-claro: #f5f5f5;
  --borde: #e0e0e0;
  --texto: #1a1a1a;
  --texto-sub: #666;
  --blanco: #fff;
  --radio: 12px;
  --radio-sm: 8px;
  --radio-xs: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: var(--texto); min-height: 100vh; color-scheme: light; }
.app { max-width: 640px; margin: 0 auto; padding: 12px; }

/* HEADER */
.header { background: white; border-radius: var(--radio); padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.day-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.day-tab { font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 1.5px solid var(--borde); background: white; color: var(--gris); cursor: pointer; font-weight: 500; transition: all .15s; white-space: nowrap; }
.day-tab.active { background: var(--verde); color: white; border-color: var(--verde); }
.day-tab.today { border-color: var(--amarillo); color: #8a6d00; background: #fffde7; }
.day-tab.today.active { background: var(--verde); color: white; border-color: var(--verde); }
.cfg-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--gris); padding: 0 0 0 8px; flex-shrink: 0; }

/* HERO */
.hero { background: linear-gradient(135deg, #3C3489 0%, #534AB7 100%); border-radius: var(--radio); padding: 16px; margin-bottom: 10px; color: white; display: flex; justify-content: space-between; align-items: center; }
.hero-left {}
.hero-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; opacity: .8; margin-bottom: 2px; }
.hero-time { font-size: 36px; font-weight: 300; line-height: 1; }
.hero-sub { font-size: 11px; opacity: .7; margin-top: 3px; }
.bed-badge { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); border-radius: 99px; padding: 6px 12px; text-align: center; }
.bed-label { font-size: 10px; opacity: .8; }
.bed-time { font-size: 16px; font-weight: 500; }

/* PROGRESS */
.prog-wrap { background: white; border-radius: var(--radio); padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.prog-bar { flex: 1; height: 6px; background: var(--gris-claro); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 6px; background: var(--verde); border-radius: 99px; transition: width .4s; }
.prog-text { font-size: 12px; color: var(--gris); min-width: 36px; text-align: right; font-weight: 500; }

/* BANNERS */
.banner { border-radius: var(--radio-sm); padding: 10px 14px; margin-bottom: 8px; border: 1.5px solid; }
.banner.charla { background: #FFF8E1; border-color: #FFD54F; }
.banner.conf { background: #FCE4EC; border-color: #F48FB1; }
.banner.retiro { background: var(--morado-claro); border-color: #CE93D8; }
.banner-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.banner-sub { font-size: 12px; color: var(--texto-sub); }
.wa-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; padding: 7px 14px; background: #25D366; color: white; border: none; border-radius: var(--radio-xs); font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none; }

/* SECTION */
.sec-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--gris); margin: 14px 0 6px; padding-left: 2px; }

/* ITEM */
.item { background: white; border-radius: var(--radio-sm); border: 1.5px solid var(--borde); margin-bottom: 6px; overflow: hidden; transition: border-color .15s; }
.item.done { opacity: .5; }
.item.done .item-name { text-decoration: line-through; }
.item.hero { border-color: #7F77DD; background: #FAFAFF; }
.item.misa { border-color: #66BB6A; }
.item-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; cursor: pointer; }
.chk { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--borde); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all .2s; }
.chk.on { background: var(--verde); border-color: var(--verde); color: white; font-size: 12px; }
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; color: var(--texto); }
.item-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.item-time { font-size: 11px; color: var(--gris); }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; cursor: default; }
.tag-def { background: var(--azul-claro); color: var(--azul); }
.tag-hero { background: #EEEDFE; color: #534AB7; }
.tag-verde { background: var(--verde-claro); color: var(--verde-oscuro); }
.tag-rojo { background: #FCEBEB; color: #A32D2D; }
.tag-btn { cursor: pointer; background: var(--verde-claro); color: var(--verde-oscuro); border: 1px solid var(--verde); }
.tag-btn-blue { cursor: pointer; background: var(--azul-claro); color: var(--azul); border: 1px solid var(--azul); }
.tag-btn-amber { cursor: pointer; background: #FFF8E1; color: #8a6d00; border: 1px solid #FFD54F; }
.tag-btn-purple { cursor: pointer; background: var(--morado-claro); color: var(--morado); border: 1px solid #CE93D8; }
.info-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--gris); padding: 0; margin-left: auto; flex-shrink: 0; }

/* EXPANDIBLES */
.expand { display: none; padding: 0 12px 12px; }
.expand.open { display: block; }
.tip { font-size: 12px; color: var(--texto-sub); line-height: 1.6; padding: 8px 10px; background: var(--gris-claro); border-radius: var(--radio-xs); border-left: 3px solid var(--verde); margin-bottom: 8px; }
.res-box { margin-top: 6px; }
.res-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--gris); margin-bottom: 6px; }
.res-links { display: flex; flex-direction: column; gap: 6px; }
.res-link { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: var(--radio-xs); border: 1px solid; text-decoration: none; font-size: 13px; font-weight: 500; transition: opacity .15s; }
.res-link:hover { opacity: .8; }
.res-link.verde { background: var(--verde-claro); border-color: var(--verde); color: var(--verde-oscuro); }
.res-link.azul { background: var(--azul-claro); border-color: var(--azul); color: #1a5276; }
.res-link.amber { background: #FFF8E1; border-color: #FFD54F; color: #8a6d00; }
.res-link.morado { background: var(--morado-claro); border-color: #CE93D8; color: var(--morado); }
.res-link.rojo { background: #FCEBEB; border-color: #F48FB1; color: #A32D2D; }
.res-link.cronica { background: #FBE9E7; border-color: #FFAB91; color: #8B4513; }
audio { width: 100%; margin-top: 6px; border-radius: var(--radio-xs); }
.misterio-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 10px; border-radius: 99px; margin-bottom: 8px; font-weight: 500; }

/* CONGRATS */
.congrats { display: none; text-align: center; padding: 20px; background: var(--verde-claro); border-radius: var(--radio); border: 2px solid var(--verde); margin-top: 10px; }
.congrats.show { display: block; }
.congrats-title { font-size: 18px; font-weight: 600; color: var(--verde-oscuro); }
.congrats-sub { font-size: 13px; color: var(--verde); margin-top: 4px; }

/* FOOTER */
.footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding: 0 2px; }
.version { font-size: 10px; color: #bbb; }
.footer-btns { display: flex; gap: 12px; }
.footer-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--gris); padding: 4px 0; }
.footer-btn.blue { color: #534AB7; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; overflow-y: auto; padding: 20px 12px; }
.modal-overlay.open { display: block; }
.modal { background: white; border-radius: var(--radio); max-width: 600px; margin: 0 auto; overflow: hidden; }
.modal-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--borde); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--gris); line-height: 1; }
.modal-body { padding: 16px; }

/* EXAMEN */
.exam-dots { display: flex; gap: 6px; margin-bottom: 16px; }
.exam-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--borde); }
.exam-dot.done { background: var(--verde); }
.exam-dot.cur { background: #5DCAA5; }
.exam-q { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.exam-sub { font-size: 13px; color: var(--texto-sub); line-height: 1.6; margin-bottom: 12px; }
.exam-card { background: var(--gris-claro); border-radius: var(--radio-xs); padding: 12px 14px; margin-bottom: 10px; }
.exam-card-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--gris); margin-bottom: 8px; }
.scale-row { display: flex; gap: 8px; margin: 8px 0; }
.scale-btn { width: 44px; height: 44px; border-radius: var(--radio-xs); border: 1.5px solid var(--borde); background: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all .15s; }
.scale-btn.sel { background: var(--verde); border-color: var(--verde); color: white; }
.scale-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--gris); margin-bottom: 10px; }
.norma-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--borde); }
.norma-row:last-child { border-bottom: none; }
.norma-name { flex: 1; font-size: 13px; }
.norma-btns { display: flex; gap: 6px; }
.norma-btn { font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 1.5px solid var(--borde); background: white; cursor: pointer; }
.norma-btn.ok { background: var(--verde-claro); color: var(--verde-oscuro); border-color: var(--verde); }
.norma-btn.fail { background: #FCEBEB; color: #A32D2D; border-color: #E24B4A; }
.textarea { width: 100%; padding: 10px; border-radius: var(--radio-xs); border: 1.5px solid var(--borde); font-family: inherit; font-size: 13px; resize: vertical; min-height: 80px; margin-top: 6px; }
.textarea:focus { outline: none; border-color: var(--verde); }
.btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.btn { padding: 9px 18px; border-radius: var(--radio-xs); border: 1.5px solid var(--borde); background: white; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn.pri { background: var(--verde); color: white; border-color: var(--verde); }
.btn.full { width: 100%; justify-content: center; display: flex; align-items: center; gap: 6px; }
.ev-row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--borde); }
.ev-row:last-child { border-bottom: none; }
.ev-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--verde); margin-top: 5px; flex-shrink: 0; }
.ev-name { font-size: 13px; font-weight: 500; }
.ev-time { font-size: 11px; color: var(--gris); margin-top: 2px; }
.plan-row { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--borde); }
.plan-row:last-child { border-bottom: none; }
.plan-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--borde); margin-top: 6px; flex-shrink: 0; }
.plan-dot.warn { background: #FF9800; }
.plan-time { font-size: 11px; color: var(--verde); font-weight: 600; min-width: 90px; }
.plan-name { font-size: 13px; }
.plan-note { font-size: 11px; color: var(--gris); margin-top: 2px; }
.sum-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--borde); font-size: 13px; }
.sum-row:last-child { border-bottom: none; }
.badge-g { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--verde-claro); color: var(--verde-oscuro); font-weight: 500; }

/* CONFIG */
.cfg-section { margin-bottom: 20px; }
.cfg-sec-title { font-size: 13px; font-weight: 600; color: var(--texto); padding-bottom: 8px; border-bottom: 1.5px solid var(--borde); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.cfg-row { margin-bottom: 10px; }
.cfg-label { font-size: 12px; color: var(--gris); margin-bottom: 4px; display: block; }
.cfg-input { width: 100%; padding: 8px 10px; border-radius: var(--radio-xs); border: 1.5px solid var(--borde); font-family: inherit; font-size: 13px; }
.cfg-input:focus { outline: none; border-color: var(--verde); }
.cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* IGLESIAS */
.iglesia-item { padding: 10px 0; border-bottom: 1px solid var(--borde); }
.iglesia-item:last-child { border-bottom: none; }
.iglesia-name { font-size: 13px; font-weight: 600; color: var(--verde-oscuro); }
.iglesia-addr { font-size: 11px; color: var(--gris); margin-top: 2px; }
.iglesia-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.iglesia-links { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.iglesia-link { font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 1px solid; text-decoration: none; }
.map-div { width: 100%; height: 180px; border-radius: var(--radio-xs); margin-top: 10px; }

/* SPLASH / PORTADA */
.splash { position: fixed; inset: 0; background: linear-gradient(160deg, #0d0820 0%, #1a0a2e 30%, #2d1b5e 65%, #3C3489 100%); display: flex; flex-direction: column; align-items: center; justify-content: space-between; z-index: 200; padding: 52px 0 44px 0; text-align: center; overflow: hidden; }
.splash-bg-img { width: 75%; max-width: 300px; opacity: 0.72; pointer-events: none; mix-blend-mode: screen; filter: blur(0.2px); display: block; margin: 20px auto 0; }
.splash-top { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; padding-top: 0; }
.splash-title { font-size: 30px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-bottom: 4px; text-shadow: 0 2px 20px rgba(83,74,183,.6); }
.splash-lema { font-size: 12px; color: rgba(255,255,255,.45); margin-bottom: 0; font-style: italic; letter-spacing: 0.02em; }
.splash-middle { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
.splash-clock { font-size: 64px; font-weight: 100; color: rgba(255,255,255,.92); line-height: 1; letter-spacing: -3px; margin-bottom: 4px; font-variant-numeric: tabular-nums; text-shadow: 0 0 40px rgba(140,120,255,.4); }
.splash-date { font-size: 13px; color: rgba(255,255,255,.5); text-transform: capitalize; letter-spacing: 0.05em; margin-bottom: 36px; }
.splash-btns { position: relative; z-index: 2; display: flex; flex-direction: column; gap: 12px; width: calc(100% - 48px); max-width: 320px; }
.splash-btn { width: 100%; padding: 16px 20px; border-radius: 16px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 12px; font-family: inherit; transition: transform .15s, box-shadow .15s; }
.splash-btn:active { transform: scale(.97); }
.splash-btn.primary { background: linear-gradient(135deg, #534AB7 0%, #7B6DD4 100%); color: #fff; box-shadow: 0 8px 28px rgba(83,74,183,.55); }
.splash-btn.secondary { background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); border: 1px solid rgba(255,255,255,.18); backdrop-filter: blur(12px); }
.splash-btn-icon { font-size: 20px; flex-shrink: 0; }
.splash-btn-lbl { display: flex; flex-direction: column; align-items: flex-start; }
.splash-btn-title { font-size: 14px; font-weight: 700; line-height: 1.2; }
.splash-btn-sub { font-size: 11px; font-weight: 400; opacity: .6; margin-top: 2px; }

/* modo oscuro desactivado — forzar siempre claro */
.plan-ev-card { background:white; border:1.5px solid var(--borde); border-left:3px solid var(--verde); border-radius:var(--radio-sm); padding:10px 12px; margin-bottom:6px; }
.plan-ev-card.past { opacity:.45; border-left-color:var(--borde); }
.plan-ev-card.now  { border-left-color:var(--amarillo); background:#FFFDE7; }
.plan-ev-card.tmrw { border-left-color:var(--azul); }
.plan-ev-time { font-size:11px; color:var(--gris); font-weight:500; }
.plan-ev-name { font-size:14px; font-weight:500; color:var(--texto); margin-top:2px; }
.plan-ev-loc  { font-size:11px; color:var(--gris); margin-top:2px; }
.plan-sec-hdr { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gris); margin:14px 0 6px; padding-left:2px; display:flex;align-items:center;gap:6px; }
.plan-sec-dot { width:7px;height:7px;border-radius:50%;background:var(--verde);display:inline-block; }
.plan-sec-dot.azul { background:var(--azul); }
.now-badge { display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;background:#FFF8E1;color:#8a6d00;border:1px solid #FFD54F;margin-left:6px; }
</style>
</head>

const DAY_KEYS = ['dom','lun','mar','mie','jue','vie','sab'];
const todayKey  = DAY_KEYS[new Date().getDay()];
const todayIdx  = DAYS.findIndex(d => d.key === todayKey);

let curDay  = todayIdx >= 0 ? todayIdx : 0;
let state   = {};
let examOpen= false;
let examData= { step:0, normas:{}, nota:3, prop:'', sent:'' };
let modalMode = null; // 'exam' | 'cfg'

function sk(k, id) { return k + '_' + id; }
function loadState()  { try { const s = localStorage.getItem('pv17'); if (s) state = JSON.parse(s); else { const old = localStorage.getItem('pv16'); if (old) state = JSON.parse(old); } } catch(e){} }
function saveState()  { try { localStorage.setItem('pv17', JSON.stringify(state)); } catch(e){} }
function loadConfig() { try { return JSON.parse(localStorage.getItem('pv16_cfg') || '{}'); } catch(e) { return {}; } }
function saveConfig(c){ try { localStorage.setItem('pv16_cfg', JSON.stringify(c)); } catch(e){} }

function getProgress(di) {
  const day = DAYS[di];
  let tot=0, dn=0;
  day.secs.forEach(s => s.items.forEach(it => { tot++; if (state[sk(day.key,it.id)]) dn++; }));
  return { tot, dn };
}

// ─── RENDER PRINCIPAL ──────────────────────────────────────────────────────
function renderAll() {
  renderTabs();
  renderHero();
  renderProgress();
  renderBanners();
  renderContent();
}

function renderTabs() {
  const c = document.getElementById('day-tabs');
  c.innerHTML = '';
  DAYS.forEach((d, i) => {
    const { dn, tot } = getProgress(i);
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === curDay ? ' active' : '') + (d.key === todayKey ? ' today' : '');
    btn.textContent = d.label + (dn === tot && tot > 0 ? ' ✓' : '');
    btn.onclick = () => { curDay = i; renderAll(); };
    c.appendChild(btn);
  });
}

function renderHero() {
  const day = DAYS[curDay];
  document.getElementById('hero-time').textContent = day.wakeTime;
  document.getElementById('bed-time').textContent  = day.bedTime;
}

function renderProgress() {
  const { dn, tot } = getProgress(curDay);
  const pct = tot > 0 ? Math.round((dn/tot)*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = dn + '/' + tot;
  document.getElementById('congrats').className = 'congrats' + (dn===tot && tot>0 ? ' show' : '');
}

// ─── OUTLOOK VIA MICROSOFT LOGIN (MSAL) ───────────────────────────────────
const MSAL_CLIENT_ID = '17d230c0-11bd-4aa4-b343-62ba5ae1cbc8'; // Plan de Vida - Bexiflon
const MSAL_SCOPES    = ['Calendars.Read', 'User.Read'];
const MSAL_AUTHORITY = 'https://login.microsoftonline.com/common';

let msalToken = null;

function getMsalToken() {
  try { return localStorage.getItem('ms_token') || null; } catch(e) { return null; }
}
function setMsalToken(t) {
  try { localStorage.setItem('ms_token', t); } catch(e) {}
}
function clearMsalToken() {
  try { localStorage.removeItem('ms_token'); } catch(e) {}
}

async function loginMicrosoft() {
  // Usamos el flujo OAuth2 implicit grant con popup
  const redirectUri = encodeURIComponent(window.location.href.split('?')[0].split('#')[0]);
  const scope = encodeURIComponent(MSAL_SCOPES.join(' '));
  const nonce = Math.random().toString(36).slice(2);
  const state = Math.random().toString(36).slice(2);
  localStorage.setItem('ms_oauth_state', state);

  const url = `${MSAL_AUTHORITY}/oauth2/v2.0/authorize` +
    `?client_id=${MSAL_CLIENT_ID}` +
    `&response_type=token` +
    `&redirect_uri=${redirectUri}` +
    `&scope=${scope}` +
    `&nonce=${nonce}` +
    `&state=${state}` +
    `&prompt=select_account`;

  const popup = window.open(url, 'mslogin', 'width=500,height=650,top=100,left=200');

  return new Promise((resolve, reject) => {
    const timer = setInterval(() => {
      try {
        if (!popup || popup.closed) {
          clearInterval(timer);
          reject(new Error('Ventana cerrada'));
          return;
        }
        const hash = popup.location.hash;
        if (hash && hash.includes('access_token')) {
          clearInterval(timer);
          popup.close();
          const params = new URLSearchParams(hash.slice(1));
          const token = params.get('access_token');
          if (token) {
            setMsalToken(token);
            resolve(token);
          } else {
            reject(new Error('Token no recibido'));
          }
        }
      } catch(e) {
        // Cross-origin mientras carga — normal, seguimos esperando
      }
    }, 500);
    // Timeout 3 minutos
    setTimeout(() => { clearInterval(timer); if (!popup.closed) popup.close(); reject(new Error('Timeout')); }, 180000);
  });
}

async function leerOutlook() {
  const area = document.getElementById('outlook-area');
  if (!area) return;

  let token = getMsalToken();

  if (!token) {
    area.innerHTML = `
      <div class="exam-card" style="background:#EAF4FB;border:1px solid #90CAF9;">
        <div style="font-size:13px;font-weight:600;color:#1a5276;margin-bottom:6px;">📅 Conectar con Outlook</div>
        <div style="font-size:12px;color:#1a5276;margin-bottom:12px;">Inicia sesión con tu cuenta de Microsoft para leer tu calendario automáticamente cada noche.</div>
        <button class="btn pri" style="background:#0078D4;border-color:#0078D4;width:100%;" onclick="conectarOutlook()">
          🔑 Iniciar sesión con Microsoft
        </button>
      </div>`;
    return;
  }

  area.innerHTML = `<div class="exam-card" style="background:#EAF4FB;border:1px solid #90CAF9;">
    <div style="font-size:12px;color:#1a5276;">📅 Leyendo tu calendario de Outlook...</div>
  </div>`;

  try {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const start = new Date(tomorrow); start.setHours(0,0,0,0);
    const end   = new Date(tomorrow); end.setHours(23,59,59,999);

    const resp = await fetch(
      `https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${start.toISOString()}&endDateTime=${end.toISOString()}&$select=subject,start,end,location&$orderby=start/dateTime&$top=20`,
      { headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' } }
    );

    if (resp.status === 401) {
      clearMsalToken();
      area.innerHTML = `<div class="exam-card" style="background:#FFF8E1;border:1px solid #FFD54F;">
        <div style="font-size:12px;color:#8a6d00;margin-bottom:8px;">⚠️ Sesión expirada. Vuelve a conectar.</div>
        <button class="btn pri" style="background:#0078D4;border-color:#0078D4;width:100%;" onclick="conectarOutlook()">🔑 Reconectar con Microsoft</button>
      </div>`;
      return;
    }

    const data = await resp.json();
    const events = data.value || [];
    try { sessionStorage.setItem('outlook_events', JSON.stringify(events)); } catch(e) {}

    if (!events.length) {
      area.innerHTML = `<div class="exam-card"><div style="font-size:13px;color:var(--verde);">📅 Sin eventos en Outlook para mañana.</div></div>`;
      return;
    }

    const rows = events.map(ev => {
      const _ft = dt => { if(!dt) return ''; let d; if(dt.endsWith('Z')||dt.includes('+')||dt.includes('-',10)){ d=new Date(dt); } else { d=new Date(dt+'Z'); } return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Madrid'}); };
      const s = _ft(ev.start?.dateTime);
      const e = _ft(ev.end?.dateTime);
      const loc = ev.location?.displayName ? ' · ' + ev.location.displayName : '';
      return `<div class="ev-row"><div class="ev-dot"></div><div>
        <div class="ev-name">${ev.subject||'Evento'}</div>
        <div class="ev-time">${s}${e?'–'+e:''}${loc}</div>
      </div></div>`;
    }).join('');

    // Calcular minuto heroico desde el primer evento
    const first = events[0];
    let heroHtml = '';
    if (first?.start?.dateTime) {
      const fs = new Date(first.start.dateTime);
      const heroMs = fs.getTime() - (75 + 75) * 60000;
      const heroDate = new Date(heroMs);
      const hh = String(heroDate.getHours()).padStart(2,'0');
      const hm = String(heroDate.getMinutes()).padStart(2,'0');
      const bedH = String((heroDate.getHours() - 8 + 24) % 24).padStart(2,'0');
      heroHtml = `
        <div class="exam-card" style="margin-top:8px;">
          <div class="exam-card-lbl">⏰ Minuto heroico calculado</div>
          <div style="font-size:22px;font-weight:300;color:#3C3489;">${hh}:${hm}</div>
          <div style="font-size:12px;color:#534AB7;">Acuéstate esta noche antes de las ${bedH}:${hm}</div>
        </div>`;
    }

    area.innerHTML = `
      <div class="exam-card"><div class="exam-card-lbl">📅 Outlook — mañana</div>${rows}</div>
      ${heroHtml}
      <div style="text-align:right;margin-top:4px;">
        <button onclick="clearMsalToken();leerOutlook();" style="background:none;border:none;font-size:11px;color:var(--gris);cursor:pointer;">Cambiar cuenta</button>
      </div>`;

  } catch(err) {
    area.innerHTML = `<div class="exam-card" style="background:#FCEBEB;">
      <div style="font-size:12px;color:#A32D2D;">⚠️ Error leyendo Outlook: ${err.message||'Error desconocido'}</div>
      <button class="btn" style="margin-top:8px;width:100%;" onclick="clearMsalToken();leerOutlook();">Volver a conectar</button>
    </div>`;
  }
}

// ─── BUSCADOR DE IGLESIAS ──────────────────────────────────────────────────
function buscarIglesias(nextWake) {
  if (!navigator.geolocation) {
    const el = document.getElementById('iglesias-loading');
    if (el) el.textContent = 'Geolocalización no disponible.';
    return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    loadGMaps(() => mostrarIglesias(pos.coords.latitude, pos.coords.longitude, nextWake));
  }, () => {
    const el = document.getElementById('iglesias-loading');
    if (el) el.textContent = 'No se pudo obtener tu ubicación.';
  }, { timeout:8000 });
}

function loadGMaps(cb) {
  if (window.google?.maps) { cb(); return; }
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&libraries=places`;
  s.onload = cb;
  document.head.appendChild(s);
}

function mostrarIglesias(lat, lng, nextWake) {
  const ldg  = document.getElementById('iglesias-loading');
  const list = document.getElementById('iglesias-list');
  const mapDiv = document.getElementById('map-container');
  if (!ldg || !list || !mapDiv) return;

  ldg.textContent = '🔍 Buscando iglesias...';
  mapDiv.style.display = 'block';

  const map = new google.maps.Map(mapDiv, { center:{lat,lng}, zoom:14, mapTypeControl:false, streetViewControl:false });
  new google.maps.Marker({ position:{lat,lng}, map, title:'Tu ubicación',
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:7,fillColor:'#1D9E75',fillOpacity:1,strokeColor:'white',strokeWeight:2} });

  new google.maps.places.PlacesService(map).nearbySearch(
    { location:{lat,lng}, radius:2000, keyword:'iglesia católica', type:'church' },
    (results, status) => {
      ldg.style.display = 'none';
      if (status !== google.maps.places.PlacesServiceStatus.OK || !results?.length) {
        list.innerHTML = '<div style="font-size:12px;color:var(--gris);">No se encontraron iglesias en 2km.</div>';
        return;
      }
      results.slice(0,5).forEach(place => {
        const R=6371000, dLat=(place.geometry.location.lat()-lat)*Math.PI/180, dLng=(place.geometry.location.lng()-lng)*Math.PI/180;
        const dist = Math.round(R*2*Math.atan2(Math.sqrt(Math.sin(dLat/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(place.geometry.location.lat()*Math.PI/180)*Math.sin(dLng/2)**2),Math.sqrt(1-(Math.sin(dLat/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(place.geometry.location.lat()*Math.PI/180)*Math.sin(dLng/2)**2))));
        const walk = Math.round(dist/80);
        const distStr = dist<1000 ? dist+'m' : (dist/1000).toFixed(1)+'km';
        const item = document.createElement('div');
        item.className = 'iglesia-item';
        item.innerHTML = `
          <div class="iglesia-name">${place.name}</div>
          <div class="iglesia-addr">${place.vicinity||''}</div>
          <div class="iglesia-tags">
            <span class="tag tag-verde">🚶 ${distStr} · ${walk} min</span>
            ${place.opening_hours ? `<span class="tag ${place.opening_hours.open_now?'tag-verde':'tag-rojo'}">${place.opening_hours.open_now?'Abierta':'Cerrada'}</span>` : ''}
          </div>
          <div class="iglesia-links">
            <a class="iglesia-link" style="background:#E1F5EE;border-color:var(--verde);color:var(--verde-oscuro);" href="https://www.google.com/maps/dir/?api=1&destination=${place.geometry.location.lat()},${place.geometry.location.lng()}&travelmode=walking" target="_blank">🗺 Cómo llegar</a>
          </div>`;
        list.appendChild(item);
        const marker = new google.maps.Marker({ position:place.geometry.location, map, title:place.name });
        marker.addListener('click', () => new google.maps.InfoWindow({content:`<b style="font-size:12px;">${place.name}</b><br><small>${distStr} · ${walk} min a pie</small>`}).open(map,marker));
      });
    }
  );
}

async function syncOutlook() {
  const btn = document.getElementById('outlook-sync-btn');
  const token = getMsalToken();
  if (!token) {
    // No conectado — lanzar login
    if (btn) { btn.textContent = '🔄'; btn.disabled = true; }
    try {
      await loginMicrosoft();
      await _fetchOutlookEvents();
      if (btn) { btn.textContent = '✅'; btn.disabled = false; setTimeout(() => { btn.textContent = '📅'; }, 2000); }
    } catch(e) {
      if (btn) { btn.textContent = '📅'; btn.disabled = false; }
    }
    return;
  }
  if (btn) { btn.textContent = '🔄'; btn.disabled = true; }
  try {
    await _fetchOutlookEvents();
    if (btn) { btn.textContent = '✅'; btn.disabled = false; setTimeout(() => { btn.textContent = '📅'; }, 2000); }
  } catch(e) {
    if (btn) { btn.textContent = '❌'; btn.disabled = false; setTimeout(() => { btn.textContent = '📅'; }, 2000); }
  }
}

async function _fetchOutlookEvents() {
  const token = getMsalToken();
  if (!token) throw new Error('Sin token');
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const start = new Date(tomorrow); start.setHours(0,0,0,0);
  const end   = new Date(tomorrow); end.setHours(23,59,59,999);
  const resp = await fetch(
    'https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=' + start.toISOString() + '&endDateTime=' + end.toISOString() + '&=subject,start,end,location&=start/dateTime&=20',
    { headers: { Authorization: 'Bearer ' + token } }
  );
  if (resp.status === 401) { clearMsalToken(); throw new Error('Token expirado'); }
  const data = await resp.json();
  const events = data.value || [];
  try { sessionStorage.setItem('outlook_events', JSON.stringify(events)); } catch(e) {}
  return events;
}

// ─── PLAN DEL DÍA ──────────────────────────────────────────────────────────
function _ftMadrid(dt) {
  if (!dt) return '';
  // Si la cadena no tiene zona horaria, asumir UTC y sumar 2h (Europe/Madrid)
  let d;
  if (dt.endsWith('Z') || dt.includes('+') || dt.includes('-', 10)) {
    d = new Date(dt);
  } else {
    // Sin timezone: tratar como UTC
    d = new Date(dt + 'Z');
  }
  return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Madrid' });
}

// ─── HELPERS PLAN DEL DÍA ─────────────────────────────────────────────────
function _parseHourFromT(t) {
  // Extrae la hora de inicio de strings como "07:15", "07:15–07:45", "A elegir", "Todo el día"
  if (!t) return null;
  const m = t.match(/^(\d{1,2}):(\d{2})/);
  if (!m) return null;
  return parseInt(m[1]) * 60 + parseInt(m[2]);
}

function _normaCardHtml(item, isDone, sectionLabel) {
  const done = isDone;
  const icon = item.tipo === 'hero' ? '⏰' : item.tipo === 'misa' ? '⛪' : item.tipo === 'rosario' ? '📿' :
               item.tipo === 'exam' ? '🌙' : item.tipo === 'preces' ? '🎵' : item.tipo === 'om' ? '🙏' :
               item.tipo === 'ofs' ? '✝️' : item.tipo === 'ag' ? '🕊️' : item.tipo === 'angelus' ? '🔔' :
               item.tipo === 'ot' ? '📖' : item.tipo === 'nt' ? '📜' : item.id === 'lec' ? '📖' : '•';
  const timeStr = item.t && item.t !== 'A elegir' && item.t !== 'Todo el día' ? item.t : '';
  return `<div class="plan-ev-card" style="opacity:${done?0.45:1};border-left-color:${done?'var(--borde)':'#7B2D9E'};">
    <div class="plan-ev-time" style="color:${done?'var(--gris)':'#7B2D9E'};">${icon} Norma${timeStr?' · '+timeStr:''}</div>
    <div class="plan-ev-name" style="${done?'text-decoration:line-through;color:var(--gris)':''}">${item.n}</div>
    ${done ? '<div class="plan-ev-loc">✓ Completada</div>' : ''}
  </div>`;
}

async function renderPlanDia() {
  document.getElementById('modal-title').textContent = '📋 Plan del día';
  const body = document.getElementById('modal-body');
  body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gris);">Cargando...</div>';

  const now = new Date();
  const todayDayIdx = now.getDay(); // 0=dom..6=sab
  const DAY_KEYS = ['dom','lun','mar','mie','jue','vie','sab'];
  const todayKey = DAY_KEYS[todayDayIdx];
  const todayDayData = DAYS.find(d => d.key === todayKey);

  // ─── 1. NORMAS DEL DÍA ───────────────────────────────────────────────────
  const normaItems = []; // { minutos, html, tipo:'norma' }
  if (todayDayData) {
    todayDayData.secs.forEach(sec => {
      sec.items.forEach(item => {
        const key = todayKey + '_' + item.id;
        const isDone = !!state[key];
        const mins = _parseHourFromT(item.t);
        normaItems.push({ mins: mins !== null ? mins : 9999, html: _normaCardHtml(item, isDone, sec.lbl), tipo:'norma', isDone });
      });
    });
  }

  // ─── 2. EVENTOS OUTLOOK ──────────────────────────────────────────────────
  const token = getMsalToken();
  let outlookItems = [];
  let outlookError = null;
  let outlookConnected = !!token;

  if (token) {
    try {
      const todayStart = new Date(now); todayStart.setHours(0,0,0,0);
      const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
      const tomorrowEnd = new Date(tomorrow); tomorrowEnd.setHours(23,59,59,999);

      const resp = await fetch(
        `https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${todayStart.toISOString()}&endDateTime=${tomorrowEnd.toISOString()}&$select=subject,start,end,location&$orderby=start/dateTime&$top=30`,
        { headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' } }
      );
      if (resp.status === 401) { clearMsalToken(); outlookConnected = false; }
      else {
        const data = await resp.json();
        const todayDateStr = now.toLocaleDateString('es-ES', { timeZone: 'Europe/Madrid' });
        (data.value || []).forEach(ev => {
          const dtRaw = ev.start?.dateTime || ev.start?.date;
          if (!dtRaw) return;
          let d = dtRaw.endsWith('Z') || dtRaw.includes('+') || dtRaw.includes('-',10) ? new Date(dtRaw) : new Date(dtRaw+'Z');
          const dayStr = d.toLocaleDateString('es-ES', { timeZone: 'Europe/Madrid' });
          if (dayStr !== todayDateStr) return; // solo hoy
          // calcular minutos del día en Madrid
          const madridStr = d.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Madrid' });
          const mm = madridStr.match(/(\d+):(\d+)/);
          const mins = mm ? parseInt(mm[1])*60+parseInt(mm[2]) : 9999;
          const s = _ftMadrid(ev.start?.dateTime || ev.start?.date);
          const e = _ftMadrid(ev.end?.dateTime || ev.end?.date);
          const loc = ev.location?.displayName ? `<div class="plan-ev-loc">📍 ${ev.location.displayName}</div>` : '';
          const startD = new Date(dtRaw.endsWith('Z')||dtRaw.includes('+')||dtRaw.includes('-',10) ? dtRaw : dtRaw+'Z');
          const endRaw = ev.end?.dateTime;
          const endD = endRaw ? new Date(endRaw.endsWith('Z')||endRaw.includes('+')||endRaw.includes('-',10)?endRaw:endRaw+'Z') : null;
          const isNow = endD && now >= startD && now <= endD;
          const isPast = endD && now > endD;
          const badge = isNow ? '<span class="now-badge">EN CURSO</span>' : '';
          const cls = isNow ? 'now' : '';
          const html = `<div class="plan-ev-card ${cls}" style="opacity:${isPast?0.45:1};">
            <div class="plan-ev-time" style="color:var(--azul);">📅 Outlook · ${s}${e?' – '+e:''}${badge}</div>
            <div class="plan-ev-name">${ev.subject||'Evento'}</div>
            ${loc}
          </div>`;
          outlookItems.push({ mins, html, tipo:'outlook', isPast });
        });
      }
    } catch(err) {
      outlookError = err.message || 'Error desconocido';
    }
  }

  // ─── 3. MEZCLAR Y ORDENAR ────────────────────────────────────────────────
  const allItems = [...normaItems, ...outlookItems].sort((a, b) => a.mins - b.mins);

  // ─── 4. RENDER ───────────────────────────────────────────────────────────
  let html = '';

  // Cabecera de sección
  html += `<div class="plan-sec-hdr"><span class="plan-sec-dot"></span>Hoy · ${now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>`;

  if (allItems.length === 0) {
    html += `<div style="text-align:center;padding:24px 0;color:var(--gris);">Sin datos para mostrar.</div>`;
  } else {
    html += allItems.map(it => it.html).join('');
  }

  // Si no hay Outlook conectado, mostrar aviso no bloqueante
  if (!outlookConnected) {
    html += `<div style="margin-top:14px;background:#EAF4FB;border:1px solid #90CAF9;border-radius:var(--radio-sm);padding:10px 14px;">
      <div style="font-size:12px;font-weight:600;color:#1a5276;margin-bottom:6px;">📅 Conecta Outlook para ver tus eventos</div>
      <button class="btn pri" style="background:#0078D4;border-color:#0078D4;width:100%;font-size:12px;padding:7px;" onclick="conectarOutlookPlan()">🔑 Conectar con Microsoft</button>
    </div>`;
  }
  if (outlookError) {
    html += `<div style="margin-top:8px;font-size:11px;color:#A32D2D;">⚠️ Outlook: ${outlookError}</div>`;
  }
  if (outlookConnected) {
    html += `<div style="text-align:right;margin-top:8px;">
      <button onclick="clearMsalToken();renderPlanDia();" style="background:none;border:none;font-size:11px;color:var(--gris);cursor:pointer;">Cambiar cuenta</button>
    </div>`;
  }

  body.innerHTML = html;
}

}

// ─── INIT ──────────────────────────────────────────────────────────────────
// ─── SPLASH ───────────────────────────────────────────────────────────────
function splashTick() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const clockEl = document.getElementById('splash-clock');
  if (clockEl) clockEl.textContent = hh + ':' + mm + ':' + ss;
  const dateEl = document.getElementById('splash-date');
  if (dateEl) dateEl.textContent = now.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function splashGo(dest) {
  const splash = document.getElementById('splash');
  if (splash) { splash.style.opacity = '0'; splash.style.transition = 'opacity .3s'; setTimeout(() => splash.style.display='none', 300); }
  if (dest === 'plan') {
    setTimeout(() => openModal('plan'), 350);
  }
  // 'vida' simplemente muestra la app normal
}

splashTick();
setInterval(splashTick, 1000);

// ─── INIT ──────────────────────────────────────────────────────────────────
loadState();
renderAll();
// Auto-sync Outlook al cargar si hay token
if (getMsalToken()) { setTimeout(() => syncOutlook(), 1500); }
</script>
</body>
</html>
