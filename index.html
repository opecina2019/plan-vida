// Detectar día actual automáticamente
const DAY_KEYS=['dom','lun','mar','mie','jue','vie','sab'];
const today=new Date();
const todayKey=DAY_KEYS[today.getDay()];
const todayIdx=DAYS.findIndex(d=>d.key===todayKey);
let curDay=todayIdx>=0?todayIdx:0;
let state={};
// exam={step:0,normas:{},nota:3,prop:'',sent:''},examOpen=false;
function sk(k,id){return k+'_'+id;}
function load(){try{const s=localStorage.getItem('pv9');if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem('pv9',JSON.stringify(state));}catch(e){}}
function prog(di){const d=DAYS[di];let t=0,n=0;d.secs.forEach(s=>s.items.forEach(it=>{t++;if(state[sk(d.key,it.id)])n++;}));return{t,n};}

function renderTabs(){
  const c=document.getElementById('dtabs');c.innerHTML='';
  DAYS.forEach((d,i)=>{
    const{n,t}=prog(i);
    const b=document.createElement('button');
    b.className='day-tab'+(i===curDay?' active':'')+(d.warn?' warn':'');
    b.textContent=d.label+(n===t?' ✓':'');
    b.onclick=()=>{curDay=i;examOpen=false;exam={step:0,normas:{},nota:3,prop:'',sent:''};renderAll();};
    c.appendChild(b);
  });
}

  });

  const{n:n2,t:t2}=prog(curDay);
  if(n2===t2){const cg=document.createElement('div');cg.className='congrats show';cg.innerHTML='<div style="font-size:15px;font-weight:500;color:#0F6E56;">¡Plan de vida completo! ✓</div><div style="font-size:12px;color:#1D9E75;margin-top:3px;">Has santificado el día.</div>';c.appendChild(cg);}
}

function renderExam(){
  const modal=document.getElementById('exam-modal');
  const inner=document.getElementById('exam-inner');
  if(!examOpen){modal.classList.remove('open');return;}
  modal.classList.add('open');
  const day=DAYS[curDay];
  const ESTEPS=['intro','val','normas','prop','eventos','plan','cierre'];
  const s=ESTEPS[exam.step];
  inner.innerHTML='';
  const dots=document.createElement('div');dots.className='edots';
  ESTEPS.forEach((_,i)=>{const d=document.createElement('div');d.className='edot'+(i<exam.step?' done':i===exam.step?' cur':'');dots.appendChild(d);});
  inner.appendChild(dots);

  if(s==='intro'){
    inner.innerHTML+=`<div style="font-size:15px;font-weight:500;margin-bottom:.8rem;">🌙 Examen de conciencia</div>
    <div style="font-size:13px;color:#555;margin-bottom:.8rem;">Tómate unos minutos en silencio. Pídele luz para ver el día con claridad.</div>
    <div style="font-size:13px;color:#888;font-style:italic;margin-bottom:.8rem;">"Examina cada noche tu conducta del día que termina." — Camino, 238</div>
    <div class="ebtn-row"><button class="ebtn pri" onclick="eNext()">Comenzar →</button></div>`;
  } else if(s==='val'){
    inner.innerHTML+=`<div class="eq">¿Cómo ha sido el día?</div>`;

    for(let i=1;i<=5;i++){const b=document.createElement('button');b.className='sbtn'+(exam.nota===i?' sel':'');b.textContent=i;b.onclick=()=>{exam.nota=i;renderExam();};sr.appendChild(b);}
    inner.appendChild(sr);
    inner.innerHTML+=`<div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:.8rem;"><span>Muy difícil</span><span>Muy bien</span></div>
    <label style="font-size:13px;color:#555;">¿Algo que destacar?</label>
    <textarea class="etarea" id="sent-txt" placeholder="Opcional...">${exam.sent}</textarea>
    <div class="ebtn-row"><button class="ebtn" onclick="ePrev()">←</button><button class="ebtn pri" onclick="saveSent();eNext()">Continuar →</button></div>`;
  } else if(s==='normas'){
    inner.innerHTML+=`<div class="eq">Repasa las normas de hoy:</div><div id="nlist"></div>
    <div class="ebtn-row"><button class="ebtn" onclick="ePrev()">←</button><button class="ebtn pri" onclick="eNext()">Continuar →</button></div>`;
    const nl=document.getElementById('nlist');
    NORMAS.forEach((n,i)=>{const r=document.createElement('div');r.className='nrow';const st=exam.normas[i];r.innerHTML=`<span class="nname">${n}</span><div class="mbtns2"><button class="mbtn2 ${st==='ok'?'ok':''}" onclick="setN(${i},'ok')">✓</button><button class="mbtn2 ${st==='fail'?'fail':''}" onclick="setN(${i},'fail')">✗</button></div>`;nl.appendChild(r);});
  } else if(s==='prop'){
    const failed=NORMAS.filter((_,i)=>exam.normas[i]==='fail');
    inner.innerHTML+=`<div class="eq">Propósito de mejora para mañana</div>
    ${failed.length?`<div class="ecard"><div class="ecard-lbl">Normas no cumplidas</div>${failed.map(n=>`<div style="font-size:13px;color:#A32D2D;padding:2px 0;">• ${n}</div>`).join('')}</div>`:`<div style="font-size:13px;color:#1D9E75;margin-bottom:.8rem;">✓ ¡Todas las normas cumplidas!</div>`}
    <textarea class="etarea" id="prop-txt" placeholder="Escribe tu propósito concreto...">${exam.prop}</textarea>
    <div class="ebtn-row"><button class="ebtn" onclick="ePrev()">←</button><button class="ebtn pri" onclick="saveProp();eNext()">Ver mañana →</button></div>`;
  } else if(s==='eventos'){
    inner.innerHTML+=`<div class="eq">Agenda de ${day.nextLabel}:</div>`;
    if(day.nextEvents.length){
      const ec=document.createElement('div');ec.className='ecard';ec.innerHTML='<div class="ecard-lbl">Reuniones</div>';
      day.nextEvents.forEach(ev=>{const r=document.createElement('div');r.className='ev-row';r.innerHTML=`<div class="ev-dot"></div><div><div class="ev-name">${ev.n}</div><div class="ev-time">${ev.t}</div></div>`;ec.appendChild(r);});
      inner.appendChild(ec);
      if(day.nextWake!=='–')inner.innerHTML+=`<div class="ecard"><div class="ecard-lbl">Minuto heroico mañana</div><div style="font-size:20px;font-weight:500;color:#3C3489;">${day.nextWake}</div><div style="font-size:12px;color:#534AB7;">Acuéstate antes de las ${day.nextBed}</div></div>`;
    } else {
      inner.innerHTML+=`<div class="ecard"><div style="font-size:13px;color:#1D9E75;">Sin reuniones. Fin de semana.</div></div>`;
    }
    inner.innerHTML+=`
      <div class="ecard" style="border:1px solid #1D9E75;background:#E1F5EE;">
        <div class="ecard-lbl" style="color:#085041;">⛪ Iglesias cercanas para mañana</div>
        <div style="font-size:12px;color:#085041;margin-bottom:8px;">Buscando desde tu ubicación actual...</div>
        <div id="iglesias-loading" style="font-size:12px;color:#888;padding:4px 0;">📍 Detectando ubicación...</div>
        <div id="iglesias-list" style="display:none;"></div>
        <div id="iglesias-error" style="display:none;font-size:12px;color:#A32D2D;padding:4px 0;"></div>
        <div id="map-container" style="width:100%;height:200px;border-radius:8px;margin-top:8px;display:none;"></div>
      </div>
    `;
    inner.innerHTML+=`<div class="ebtn-row"><button class="ebtn" onclick="ePrev()">←</button><button class="ebtn pri" onclick="eNext()">Ver plan →</button></div>`;
    setTimeout(()=>buscarIglesias(day.nextWake),100);
  } else if(s==='plan'){
    inner.innerHTML+=`<div class="eq">Plan para ${day.nextLabel}:</div><div class="ecard" id="planlist"></div>
    ${exam.prop?`<div class="ecard"><div class="ecard-lbl">Tu propósito</div><div style="font-size:13px;">${exam.prop}</div></div>`:''}
    <div class="ebtn-row"><button class="ebtn" onclick="ePrev()">←</button><button class="ebtn pri" onclick="eNext()">Cerrar →</button></div>`;
    const pc=document.getElementById('planlist');
    const nextDay=DAYS[curDay+1];
    if(nextDay){nextDay.secs.forEach(sec=>sec.items.slice(0,3).forEach(p=>{const r=document.createElement('div');r.className='pplan-row';r.innerHTML=`<div style="display:flex;gap:5px;min-width:90px;"><div class="nd-dot"></div><span class="pplan-time">${p.t}</span></div><div class="pplan-name">${p.n}</div>`;pc.appendChild(r);}));}
    else{pc.innerHTML='<div style="font-size:13px;color:#1D9E75;">Fin de semana — tiempo libre para la oración.</div>';}
  } else if(s==='cierre'){
    const dn=Object.values(exam.normas).filter(v=>v==='ok').length;
    inner.innerHTML+=`<div style="text-align:center;padding:.5rem 0 1rem;">
      <div style="font-size:24px;">🌙</div>
      <div style="font-size:15px;font-weight:500;color:#0F6E56;margin-top:.5rem;">Buenas noches</div>
      <div style="font-size:13px;color:#555;margin-top:.3rem;">Termina con un acto de contrición. Entrega el día a Dios.</div>
    </div>
    <div class="ecard">
      <div class="sum-row"><span>Normas cumplidas</span><span class="tg-g">${dn} de ${NORMAS.length}</span></div>
      <div class="sum-row"><span>Valoración del día</span><span style="font-size:13px;">${exam.nota}/5</span></div>
      ${exam.prop?`<div class="sum-row"><span>Propósito mañana</span><span style="font-size:12px;color:#888;max-width:180px;text-align:right;">${exam.prop.substring(0,50)}${exam.prop.length>50?'...':''}</span></div>`:''}
    </div>
    <div style="font-size:13px;color:#888;text-align:center;font-style:italic;margin:.8rem 0;">"Que tu jornada de mañana empiece con Dios."</div>
    <div class="ebtn-row" style="justify-content:center;"><button class="ebtn" onclick="examOpen=false;renderAll()">✗ Cerrar</button></div>`;
  }
}

function eNext(){exam.step=Math.min(exam.step+1,6);renderExam();}
function ePrev(){exam.step=Math.max(exam.step-1,0);renderExam();}
function setN(i,v){exam.normas[i]=exam.normas[i]===v?undefined:v;renderExam();}
function saveSent(){const e=document.getElementById('sent-txt');if(e)exam.sent=e.value;}
function saveProp(){const e=document.getElementById('prop-txt');if(e)exam.prop=e.value;}
function resetDay(){const day=DAYS[curDay];day.secs.forEach(s=>s.items.forEach(it=>{delete state[sk(day.key,it.id)];}));save();examOpen=false;exam={step:0,normas:{},nota:3,prop:'',sent:''};renderAll();}
function renderAll(){renderTabs();renderContent();renderExam();}

// Buscador de iglesias con Google Maps
const GMAPS_KEY='AIzaSyAmK5IVXsEC6YxEeFqFTqLQRS0DtR7dPJg';
let gmapsLoaded=false;

function loadGMaps(cb){
  if(window.google&&window.google.maps){cb();return;}
  const s=document.createElement('script');
  s.src=`https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&libraries=places`;
  s.async=true;
  s.defer=true;
  s.onload=cb;
  document.head.appendChild(s);
}

function buscarIglesias(nextWake){
  // Calcular hora límite de misa (minuto heroico - 45 min de desplazamiento+misa)
  let horaLimite='08:00';
  if(nextWake&&nextWake!=='–'){
    const [h,m]=nextWake.split(':').map(Number);
    // Misa debe terminar 45 min antes del minuto heroico para llegar a tiempo
    // En realidad el minuto heroico ES la hora de levantarse, la misa va después
    // Misa empieza: wake + 30min arreglo + 30min oración + 15min desplazamiento
    const misaStart=h*60+m+75;
    const mh=Math.floor(misaStart/60);
    const mm=misaStart%60;
    horaLimite=`${String(mh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  }

  if(!navigator.geolocation){
    const el=document.getElementById('iglesias-error');
    if(el){el.style.display='block';el.textContent='Tu navegador no soporta geolocalización.';}
    const ld=document.getElementById('iglesias-loading');
    if(ld)ld.style.display='none';
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;
    loadGMaps(()=>mostrarIglesias(lat,lng,horaLimite));
  },err=>{
    const el=document.getElementById('iglesias-error');
    if(el){el.style.display='block';el.textContent='No se pudo obtener tu ubicación. Asegúrate de dar permiso de localización.';}
    const ld=document.getElementById('iglesias-loading');
    if(ld)ld.style.display='none';
  },{timeout:10000});
}

function mostrarIglesias(lat,lng,horaLimite){
  const ld=document.getElementById('iglesias-loading');
  if(ld)ld.textContent='🔍 Buscando iglesias católicas cercanas...';

  const mapDiv=document.getElementById('map-container');
  if(!mapDiv)return;
  mapDiv.style.display='block';

  const map=new google.maps.Map(mapDiv,{
    center:{lat,lng},
    zoom:14,
    styles:[{featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]}],
    mapTypeControl:false,
    streetViewControl:false,
  });

  // Marcador posición actual
  new google.maps.Marker({
    position:{lat,lng},
    map,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#1D9E75',fillOpacity:1,strokeColor:'white',strokeWeight:2},
    title:'Tu ubicación'
  });

  const service=new google.maps.places.PlacesService(map);
  service.nearbySearch({
    location:{lat,lng},
    radius:2000,
    keyword:'iglesia católica misa',
    type:'church'
  },(results,status)=>{
    if(ld)ld.style.display='none';
    const list=document.getElementById('iglesias-list');
    if(!list)return;

    if(status!==google.maps.places.PlacesServiceStatus.OK||!results.length){
      const el=document.getElementById('iglesias-error');
      if(el){el.style.display='block';el.textContent='No se encontraron iglesias en un radio de 2km.';}
      return;
    }

    list.style.display='block';
    list.innerHTML=`<div style="font-size:11px;color:#085041;font-weight:500;margin-bottom:6px;">Iglesias en 2km — misa antes de las ${horaLimite}:</div>`;

    const top=results.slice(0,5);
    top.forEach(place=>{
      // Calcular distancia aproximada
      const R=6371000;
      const dLat=(place.geometry.location.lat()-lat)*Math.PI/180;
      const dLng=(place.geometry.location.lng()-lng)*Math.PI/180;
      const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat*Math.PI/180)*Math.cos(place.geometry.location.lat()*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
      const dist=Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
      const distStr=dist<1000?dist+'m':(dist/1000).toFixed(1)+'km';
      const walkMin=Math.round(dist/80); // 80m/min andando

      // Marcador en el mapa
      const marker=new google.maps.Marker({
        position:place.geometry.location,
        map,
        title:place.name,
        icon:{url:'https://maps.google.com/mapfiles/ms/icons/red-dot.png'}
      });

      const row=document.createElement('div');
      row.style.cssText='padding:8px 0;border-bottom:1px solid #9FE1CB;';
      row.innerHTML=`
        <div style="font-size:13px;font-weight:500;color:#085041;">${place.name}</div>
        <div style="font-size:11px;color:#555;margin-top:2px;">📍 ${place.vicinity||''}</div>
        <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;">
          <span style="font-size:11px;background:#E1F5EE;color:#085041;padding:1px 7px;border-radius:99px;">🚶 ${distStr} · ${walkMin} min</span>
          ${place.opening_hours?`<span style="font-size:11px;background:${place.opening_hours.open_now?'#E1F5EE':'#FCEBEB'};color:${place.opening_hours.open_now?'#085041':'#A32D2D'};padding:1px 7px;border-radius:99px;">${place.opening_hours.open_now?'Abierta ahora':'Cerrada ahora'}</span>`:''}
        </div>
        <div style="display:flex;gap:6px;margin-top:6px;">
          <a href="https://www.google.com/maps/dir/?api=1&destination=${place.geometry.location.lat()},${place.geometry.location.lng()}&travelmode=walking" target="_blank" style="font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid #1D9E75;background:white;color:#085041;text-decoration:none;">🗺 Cómo llegar</a>
          <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name+' '+place.vicinity)}" target="_blank" style="font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid #85B7EB;background:white;color:#0C447C;text-decoration:none;">ℹ Ver en Maps</a>
        </div>
      `;
      list.appendChild(row);

      // Info window al pulsar marcador
      const iw=new google.maps.InfoWindow({content:`<div style="font-size:12px;font-weight:500;">${place.name}</div><div style="font-size:11px;">${distStr} · ${walkMin} min andando</div>`});
      marker.addListener('click',()=>iw.open(map,marker));
    });
  });
}
